name: Catalog Hygiene (Scripts Repo)

on:
  schedule:
    - cron: '0 2,10,18 * * *'
    - cron: '0 6,14,22 * * *'
  workflow_dispatch:
    inputs:
      series:
        description: 'Series filters, space separated'
        required: false
        default: 'LOQ ThinkPad Legion IdeaPad ThinkBook Yoga'
      scrape_all:
        description: 'Force refresh all names/specs (Full Scrape)'
        type: boolean
        default: false
      product_ids:
        description: 'Optional SKU list to target'
        required: false
        default: ''
      commit_changes:
        description: 'Commit and push changes to target website repo'
        type: boolean
        default: true

jobs:
  hygiene:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
      PYTHONUNBUFFERED: '1'
      TARGET_REPO_OWNER: ${{ secrets.TARGET_REPO_OWNER || 'kryptobolt07' }}
      TARGET_REPO_NAME: ${{ secrets.TARGET_REPO_NAME || 'laptopdeals' }}
      TARGET_REPO_BRANCH: ${{ secrets.TARGET_REPO_BRANCH || 'main' }}
      TARGET_REPO_PAT: ${{ secrets.TARGET_REPO_PAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Checkout Website Target Repository
        run: |
          git clone --branch "${TARGET_REPO_BRANCH}" "https://${TARGET_REPO_PAT}@github.com/${TARGET_REPO_OWNER}/${TARGET_REPO_NAME}.git" website-target

      - name: Scrape Lenovo listings
        shell: bash
        run: |
          only_new_arg='--only-new'
          if [[ "${{ inputs.scrape_all }}" == 'true' || -n "${{ inputs.product_ids }}" ]]; then
            only_new_arg=''
          fi
          python scripts/catalog.py scrape ${only_new_arg} --existing-file website-target/apps/web/data.json --output data/lenovo-catalog.json --new-ids-output data/lenovo-new-ids.json --verbose

      - name: Restore reappeared archive entries
        run: |
          python scripts/archive.py restore --ids-file data/lenovo-new-ids.json --data website-target/apps/web/data.json --archive website-target/apps/web/archive.json --apply

      - name: Count new Lenovo IDs
        id: new_ids
        run: |
          count=$(python -c 'import json; from pathlib import Path; p=Path("data/lenovo-new-ids.json"); print(len(json.loads(p.read_text())) if p.exists() else 0)')
          echo "count=${count}" >> "$GITHUB_OUTPUT"

      - name: BitBns primary history for new listings
        if: steps.new_ids.outputs.count != '0'
        run: |
          python scripts/prices.py bitbns-history --ids-file data/lenovo-new-ids.json --history-dir website-target/apps/web/price_history --replace-history

      - name: Refresh CTO configs
        run: |
          python scripts/cto.py --data website-target/apps/web/data.json --output-dir website-target/apps/web/cto_configs

      - name: Build Scoped PSREF specs
        if: steps.new_ids.outputs.count != '0' || inputs.scrape_all == true
        continue-on-error: true
        run: |
          if [[ "${{ inputs.scrape_all }}" == 'true' ]]; then
            python scripts/psref.py --verbose
          else
            python scripts/psref.py --ids-file data/lenovo-new-ids.json --verbose
          fi

      - name: Rebuild public catalog
        run: |
          python scripts/catalog.py format \
            --input data/lenovo-catalog.json \
            --output website-target/apps/web/data.json \
            --existing-data website-target/apps/web/data.json \
            --history-dir website-target/apps/web/price_history \
            --cto-dir website-target/apps/web/cto_configs

      - name: Refresh current prices after catalog rebuild
        run: |
          python scripts/prices.py lenovo-current --data website-target/apps/web/data.json --history-dir website-target/apps/web/price_history

      - name: Recalculate stats and inventory
        run: |
          python scripts/prices.py stats --data website-target/apps/web/data.json --history-dir website-target/apps/web/price_history
          python scripts/maintenance.py inventory --input website-target/apps/web/data.json --output website-target/data/spec_inventory.json

      - name: Commit and Push Changes to Target Website Repo
        if: inputs.commit_changes != false
        working-directory: website-target
        run: |
          git config user.email "laptopdeals-bot[bot]@users.noreply.github.com"
          git config user.name "laptopdeals-bot[bot]"
          git add apps/web/data.json apps/web/archive.json apps/web/price_history/ apps/web/cto_configs/ data/spec_inventory.json
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Automated catalog hygiene & price update - $(date +'%Y-%m-%d %H:%M:%S IST')"
            git push origin "${TARGET_REPO_BRANCH}"
          else
            echo "No changes to commit."
          fi
