name: Catalog Hygiene (Scripts Repo)

on:
  schedule:
    - cron: '0 2,10,18 * * *'
    - cron: '0 6,14,22 * * *'
  workflow_dispatch:
    inputs:
      series:
        description: 'Series filters, space separated'
        required: false
        default: 'LOQ ThinkPad Legion IdeaPad ThinkBook Yoga'
      scrape_all:
        description: 'Force refresh all names/specs (Full Scrape)'
        type: boolean
        default: false
      product_ids:
        description: 'Optional SKU list to target, comma/space separated'
        required: false
        default: ''
      commit_changes:
        description: 'Commit and push changes'
        type: boolean
        default: true
      fetch_cto_configs:
        description: 'Refresh CTO configs'
        type: boolean
        default: true
      archive_stale_models:
        description: 'Archive unavailable Lenovo models'
        type: boolean
        default: true
      archive_product_ids:
        description: 'Optional archive-check SKU list'
        required: false
        default: ''
      archive_max:
        description: 'Abort if more products would archive'
        required: false
        default: '25'
      limit_per_series:
        description: 'Optional debug limit per series'
        required: false
        default: ''
      scrape_workers:
        description: 'Parallel PDP detail workers'
        required: false
        default: '8'
      bitbns_workers:
        description: 'BitBns workers for new-listing history seeding'
        required: false
        default: '1'
      bitbns_delay:
        description: 'Seconds to wait before each BitBns request'
        required: false
        default: '5'
      price_workers:
        description: 'Lenovo current-price workers'
        required: false
        default: '6'
      cto_workers:
        description: 'CTO config workers'
        required: false
        default: '4'

permissions:
  contents: write

concurrency:
  group: data-refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hygiene:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
      PYTHONUNBUFFERED: '1'
      TARGET_REPO_OWNER: ${{ secrets.TARGET_REPO_OWNER || 'kryptobolt07' }}
      TARGET_REPO_NAME: ${{ secrets.TARGET_REPO_NAME || 'laptopdeals' }}
      TARGET_REPO_BRANCH: ${{ secrets.TARGET_REPO_BRANCH || 'main' }}
      TARGET_REPO_PAT: ${{ secrets.TARGET_REPO_PAT }}
      SERIES: ${{ github.event.inputs.series || 'LOQ ThinkPad Legion IdeaPad ThinkBook Yoga' }}
      COMMIT_CHANGES: ${{ github.event_name == 'schedule' && 'true' || inputs.commit_changes }}
      FETCH_CTO: ${{ github.event_name == 'schedule' && 'true' || inputs.fetch_cto_configs }}
      ARCHIVE_STALE: ${{ github.event_name == 'schedule' && 'true' || inputs.archive_stale_models }}
      ARCHIVE_PRODUCT_IDS: ${{ github.event.inputs.archive_product_ids || '' }}
      ARCHIVE_MAX: ${{ github.event.inputs.archive_max || '25' }}
      LIMIT_PER_SERIES: ${{ github.event.inputs.limit_per_series || '' }}
      SCRAPE_WORKERS: ${{ github.event.inputs.scrape_workers || '8' }}
      SCRAPE_ALL: ${{ github.event_name == 'schedule' && 'false' || inputs.scrape_all }}
      PRODUCT_IDS: ${{ github.event.inputs.product_ids || '' }}
      BITBNS_WORKERS: ${{ github.event.inputs.bitbns_workers || '1' }}
      BITBNS_DELAY: ${{ github.event.inputs.bitbns_delay || '5' }}
      PRICE_WORKERS: ${{ github.event.inputs.price_workers || '6' }}
      CTO_WORKERS: ${{ github.event.inputs.cto_workers || '4' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Checkout Website Target Repository
        run: |
          git clone --branch "${TARGET_REPO_BRANCH}" "https://${TARGET_REPO_PAT}@github.com/${TARGET_REPO_OWNER}/${TARGET_REPO_NAME}.git" website-target

      - name: Scrape Lenovo listings
        shell: bash
        run: |
          only_new_arg='--only-new'
          if [[ "${SCRAPE_ALL}" == 'true' || -n "${PRODUCT_IDS}" ]]; then
            only_new_arg=''
          fi
          args=(scrape --output data/lenovo-catalog.json ${only_new_arg} --existing-file website-target/apps/web/data.json --new-ids-output data/lenovo-new-ids.json --workers "${SCRAPE_WORKERS}" --verbose)
          
          # Add product ID targets if specified
          ids="${PRODUCT_IDS//,/ }"
          for pid in ${ids}; do
            args+=(--id "$pid")
          done
          
          if [[ -n "${LIMIT_PER_SERIES}" ]]; then
            args+=(--limit-per-series "${LIMIT_PER_SERIES}")
          fi
          args+=(--series)
          for item in ${SERIES}; do
            args+=("${item}")
          done
          python scripts/catalog.py "${args[@]}"

      - name: Restore reappeared archive entries
        run: |
          python scripts/archive.py restore --ids-file data/lenovo-new-ids.json --data website-target/apps/web/data.json --archive website-target/apps/web/archive.json --apply

      - name: Count new Lenovo IDs
        id: new_ids
        run: |
          count=$(python -c 'import json; from pathlib import Path; p=Path("data/lenovo-new-ids.json"); print(len(json.loads(p.read_text())) if p.exists() else 0)')
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "New Lenovo IDs: ${count}"

      - name: BitBns primary history for new listings
        if: steps.new_ids.outputs.count != '0'
        run: |
          python scripts/prices.py bitbns-history \
            --ids-file data/lenovo-new-ids.json \
            --history-dir website-target/apps/web/price_history \
            --replace-history \
            --workers "${BITBNS_WORKERS}" \
            --delay "${BITBNS_DELAY}" \
            --failed-ids-output data/bitbns-missing-ids.json

      - name: Refresh CTO configs
        if: env.FETCH_CTO == 'true'
        run: |
          python scripts/cto.py --data website-target/apps/web/data.json --output-dir website-target/apps/web/cto_configs --workers "${CTO_WORKERS}"

      - name: Re-enrich CTO specs
        if: env.FETCH_CTO == 'true'
        run: |
          python scripts/cto.py --data website-target/apps/web/data.json --output-dir website-target/apps/web/cto_configs --reenrich --force

      - name: Build PSREF specs
        if: steps.new_ids.outputs.count != '0' || env.SCRAPE_ALL == 'true' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          if [[ "${SCRAPE_ALL}" == 'true' ]]; then
            python scripts/psref.py --verbose
          else
            python scripts/psref.py --ids-file data/lenovo-new-ids.json --verbose
          fi

      - name: Rebuild public catalog
        run: |
          python scripts/catalog.py format \
            --input data/lenovo-catalog.json \
            --output website-target/apps/web/data.json \
            --existing-data website-target/apps/web/data.json \
            --history-dir website-target/apps/web/price_history \
            --cto-dir website-target/apps/web/cto_configs

      - name: Refresh current prices after catalog rebuild
        run: |
          python scripts/prices.py lenovo-current --data website-target/apps/web/data.json --history-dir website-target/apps/web/price_history --workers "${PRICE_WORKERS}"

      - name: Archive stale Lenovo models
        if: github.event_name == 'schedule' || env.ARCHIVE_STALE == 'true'
        shell: bash
        run: |
          args=(check --apply --max-archive "${ARCHIVE_MAX}" --data website-target/apps/web/data.json --archive website-target/apps/web/archive.json --raw-catalog data/lenovo-catalog.json)
          ids="${ARCHIVE_PRODUCT_IDS//,/ }"
          for product_id in ${ids}; do
            args+=(--id "${product_id}")
          done
          python scripts/archive.py "${args[@]}"

      - name: Recalculate stats and inventory
        run: |
          python scripts/prices.py stats --data website-target/apps/web/data.json --history-dir website-target/apps/web/price_history
          python scripts/maintenance.py inventory --input website-target/apps/web/data.json --output website-target/data/spec_inventory.json

      - name: Commit and Push Changes to Target Website Repo
        if: env.COMMIT_CHANGES == 'true'
        working-directory: website-target
        run: |
          git config user.email "laptopdeals-bot[bot]@users.noreply.github.com"
          git config user.name "laptopdeals-bot[bot]"
          git add apps/web/data.json apps/web/archive.json apps/web/price_history/ apps/web/cto_configs/ data/spec_inventory.json
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Catalog hygiene - $(date +'%Y-%m-%d %H:%M:%S IST')"
            git push origin "${TARGET_REPO_BRANCH}"
          else
            echo "No changes to commit."
          fi
