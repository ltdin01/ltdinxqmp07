name: Data Refresh (Scripts Repo)

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:
    inputs:
      price_source:
        description: 'Price source to run'
        type: choice
        options: [lenovo, bitbns, both]
        default: lenovo
      product_ids:
        description: 'Optional SKU list, comma/space separated'
        required: false
        default: ''
      ids_file:
        description: 'Optional JSON IDs file path'
        required: false
        default: ''
      bitbns_mode:
        description: 'BitBns history merge mode'
        type: choice
        options: [extend, replace]
        default: extend
      refresh_cto:
        description: 'Refresh CTO configs'
        type: boolean
        default: false
      lenovo_workers:
        description: 'Lenovo price workers'
        required: false
        default: '6'
      bitbns_workers:
        description: 'BitBns workers'
        required: false
        default: '1'
      bitbns_delay:
        description: 'Seconds to wait before each BitBns request'
        required: false
        default: '5'
      cto_workers:
        description: 'CTO config workers'
        required: false
        default: '4'
      commit_changes:
        description: 'Commit and push changes'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: data-refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
      PYTHONUNBUFFERED: '1'
      TARGET_REPO_OWNER: ${{ secrets.TARGET_REPO_OWNER || 'kryptobolt07' }}
      TARGET_REPO_NAME: ${{ secrets.TARGET_REPO_NAME || 'laptopdeals' }}
      TARGET_REPO_BRANCH: ${{ secrets.TARGET_REPO_BRANCH || 'main' }}
      TARGET_REPO_PAT: ${{ secrets.TARGET_REPO_PAT }}
      PRICE_SOURCE: ${{ github.event_name == 'schedule' && 'lenovo' || inputs.price_source }}
      PRODUCT_IDS: ${{ github.event.inputs.product_ids || '' }}
      IDS_FILE: ${{ github.event.inputs.ids_file || '' }}
      BITBNS_MODE: ${{ github.event_name == 'schedule' && 'extend' || inputs.bitbns_mode }}
      LENOVO_WORKERS: ${{ github.event.inputs.lenovo_workers || '6' }}
      BITBNS_WORKERS: ${{ github.event.inputs.bitbns_workers || '1' }}
      BITBNS_DELAY: ${{ github.event.inputs.bitbns_delay || '5' }}
      CTO_WORKERS: ${{ github.event.inputs.cto_workers || '4' }}
      REFRESH_CTO: ${{ github.event_name == 'schedule' && 'false' || inputs.refresh_cto }}
      COMMIT_CHANGES: ${{ github.event_name == 'schedule' && 'true' || inputs.commit_changes }}
      GIT_COMMIT_AUTHOR_NAME: ${{ secrets.GIT_COMMIT_AUTHOR_NAME || 'github-actions[bot]' }}
      GIT_COMMIT_AUTHOR_EMAIL: ${{ secrets.GIT_COMMIT_AUTHOR_EMAIL || '41898282+github-actions[bot]@users.noreply.github.com' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Checkout Website Target Repository
        run: |
          echo "Cloning target website repository: ${TARGET_REPO_OWNER}/${TARGET_REPO_NAME} branch: ${TARGET_REPO_BRANCH}"
          git clone --branch "${TARGET_REPO_BRANCH}" "https://x-access-token:${TARGET_REPO_PAT}@github.com/${TARGET_REPO_OWNER}/${TARGET_REPO_NAME}.git" website-target
          if [[ ! -f "website-target/apps/web/data.json" ]]; then
            echo "::error::Target website repository file website-target/apps/web/data.json not found! Please verify TARGET_REPO_PAT, TARGET_REPO_OWNER, and TARGET_REPO_NAME secrets."
            exit 1
          fi

      - name: Build target args
        id: targets
        shell: bash
        run: |
          args=()
          ids="${PRODUCT_IDS//,/ }"
          for product_id in ${ids}; do
            args+=(--id "$product_id")
          done
          if [[ -n "${IDS_FILE}" ]]; then
            args+=(--ids-file "${IDS_FILE}")
          fi
          if [[ ${#args[@]} -gt 0 ]]; then
            printf 'args=%q ' "${args[@]}" >> "$GITHUB_OUTPUT"
          else
            echo 'args=' >> "$GITHUB_OUTPUT"
          fi

      - name: Extend or replace BitBns history
        if: env.PRICE_SOURCE == 'bitbns' || env.PRICE_SOURCE == 'both'
        shell: bash
        run: |
          echo "=== Running BitBns History Refresh ==="
          mode_arg='--extend-history'
          if [[ "${BITBNS_MODE}" == 'replace' ]]; then
            mode_arg='--replace-history'
          fi
          python -u scripts/prices.py --data website-target/apps/web/data.json --history-dir website-target/apps/web/price_history bitbns-history ${mode_arg} --workers "${BITBNS_WORKERS}" --delay "${BITBNS_DELAY}" ${{ steps.targets.outputs.args }}

      - name: Refresh Lenovo current prices
        if: env.PRICE_SOURCE == 'lenovo' || env.PRICE_SOURCE == 'both'
        run: |
          echo "=== Refreshing Lenovo Current Prices ==="
          python -u scripts/prices.py --data website-target/apps/web/data.json --history-dir website-target/apps/web/price_history lenovo-current --workers "${LENOVO_WORKERS}" ${{ steps.targets.outputs.args }}

      - name: Refresh CTO configs
        if: env.REFRESH_CTO == 'true'
        run: |
          echo "=== Refreshing CTO Configs ==="
          python -u scripts/cto.py --data website-target/apps/web/data.json --output-dir website-target/apps/web/cto_configs --workers "${CTO_WORKERS}" ${{ steps.targets.outputs.args }}

      - name: Recalculate stats
        run: |
          echo "=== Recalculating Price History Statistics ==="
          python -u scripts/prices.py --data website-target/apps/web/data.json --history-dir website-target/apps/web/price_history stats ${{ steps.targets.outputs.args }}

      - name: Commit and Push Changes to Target Website Repo
        if: env.COMMIT_CHANGES == 'true'
        working-directory: website-target
        run: |
          echo "=== Checking Git Diff and Committing to Target Website Repository ==="
          git config user.email "${GIT_COMMIT_AUTHOR_EMAIL}"
          git config user.name "${GIT_COMMIT_AUTHOR_NAME}"
          git add apps/web/data.json apps/web/price_history/ apps/web/cto_configs/
          git status
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Automated data refresh - $(date +'%Y-%m-%d %H:%M:%S IST')"
            git push origin "${TARGET_REPO_BRANCH}"
            echo "Successfully pushed changes to ${TARGET_REPO_OWNER}/${TARGET_REPO_NAME} branch ${TARGET_REPO_BRANCH}"
          else
            echo "No price changes to commit."
          fi
